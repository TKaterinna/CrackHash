
services:

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: rabbitmq
    hostname: rabbitmq
    ports:
      - "5672:5672"    # AMQP протокол (для подключения приложений)
      - "15672:15672"  # Web UI (для мониторинга)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq  # Персистентность данных
    healthcheck:
      test: >
        bash -c '
          rabbitmq-diagnostics -q ping &&
          nc -z localhost 5672
        '
      interval: 10s
      timeout: 5s
      retries: 10  # Увеличь с 5 до 10
      start_period: 20s  # Дай время на старт перед первой проверкой
    networks:
      - crackhash-net
    restart: unless-stopped

  # Databases

  # manager-db:
  #   image: postgres:15
  #   container_name: profile_db
  #   environment:
  #     POSTGRES_USER: ${PROFILE_POSTGRES_USER}
  #     POSTGRES_PASSWORD: ${PROFILE_POSTGRES_PASSWORD}
  #     POSTGRES_DB: ${PROFILE_POSTGRES_DB}
  #   ports:
  #     - "${PROFILE_DB_PORT}:${INNER_DB_PORT}"
  #   volumes:
  #     - profile_data:/var/lib/postgresql/data
  #   networks:
  #     - crackhash-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${PROFILE_POSTGRES_USER} -d ${PROFILE_POSTGRES_DB} -h localhost || exit 1"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 25


  # Backend

  manager-service:
    build:
      context: ./manager
      dockerfile: Dockerfile
    container_name: manager
    environment:
      MANAGER_PORT: ${MANAGER_PORT}
      WORKERS_COUNT: ${WORKERS_COUNT}
      RABBITMQ_URL: ${RABBITMQ_URL}
      COMB_FOR_TASK: ${COMB_FOR_TASK}
      ERROR_DELAY: ${ERROR_DELAY}
    # depends_on:
    #   manager-db:
    #     condition: service_healthy
    ports:
      - "${MANAGER_PORT}:${INNER_SERVICE_PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - crackhash-net
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    #healthcheck:
    #  test: ["CMD-SHELL", "wget --spider --quiet http://localhost:${INNER_SERVICE_PORT}/healthz || exit 1"]
    #  interval: 5s
    #  timeout: 5s
    #  retries: 10
    #  start_period: 5s

  worker-service:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
    # depends_on:
    #   worker-db:
    #     condition: service_healthy
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - crackhash-net
    restart: on-failure
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    #healthcheck:
    #  test: ["CMD-SHELL", "wget --spider --quiet http://localhost:${INNER_SERVICE_PORT}/healthz || exit 1"]
    #  interval: 5s
    #  timeout: 5s
    #  retries: 10
    #  start_period: 5s

volumes:
  rabbitmq_data:

networks:
  crackhash-net:
    driver: bridge
