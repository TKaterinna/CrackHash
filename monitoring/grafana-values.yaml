# monitoring/grafana-values.yaml
adminPassword: admin123

resources:
  requests:
    cpu: 50m
    memory: 128Mi

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus-server.monitoring.svc.cluster.local:80
        access: proxy
        isDefault: true